services:
  pi:
    container_name: pi
    build:
      context: .
      dockerfile: Dockerfile
    image: pi-coding-agent:latest
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      - ./pi:/home/node/.pi
      - ${HOST_WS:-./workspace}:/workspace
    working_dir: /workspace
